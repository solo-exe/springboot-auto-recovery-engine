server:
    port: 8082

spring:
    application:
        name: account-service
    threads:
        virtual:
            enabled: true
    datasource:
        url: jdbc:postgresql://localhost:5432/are_db
        username: are_user
        password: are_password
        hikari:
            maximum-pool-size: 10
            minimum-idle: 2
            connection-timeout: 5000
            leak-detection-threshold: 10000
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: false
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

jwt:
    secret: ${JWT_SECRET:auto-recovery-engine-secret-key-for-jwt-token-signing-256bit}
    expiration-seconds: 86400

springdoc:
    swagger-ui:
        url: /v3/api-docs
    info:
        title: Account Service API
        version: 1.0.0
        description: API for managing user accounts.

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus,info,circuitbreakers,env,shutdown
    endpoint:
        health:
            show-details: always
        shutdown:
            access: UNRESTRICTED
    metrics:
        tags:
            application: account-service
