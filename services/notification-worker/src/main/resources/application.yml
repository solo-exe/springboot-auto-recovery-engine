server:
  port: 8085

spring:
  application:
    name: notification-worker
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": ${MAIL_SMTP_AUTH:false}
      "[mail.smtp.starttls.enable]": ${MAIL_SMTP_STARTTLS_ENABLE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,env,shutdown
  endpoint:
    health:
      show-details: always
    shutdown:
      access: UNRESTRICTED
  metrics:
    tags:
      application: notification-worker
