server:
    port: 8085
    forward-headers-strategy: framework

spring:
    application:
        name: notification-worker
    threads:
        virtual:
            enabled: true
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest
    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
            - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
            - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
    mail:
        host: ${MAIL_HOST:smtp.gmail.com}
        port: ${MAIL_PORT:587}
        username: ${MAIL_USERNAME:solomonabu90@gmail.com}
        password: ${MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                auth: ${MAIL_SMTP_AUTH:true}
                starttls:
                    enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
                    required: true
                    
management:
    endpoints:
        web:
            exposure:
                include: health,prometheus,info,env,shutdown
    endpoint:
        health:
            show-details: always
        shutdown:
            access: UNRESTRICTED
    metrics:
        tags:
            application: notification-worker

springdoc:
    api-docs:
        path: /v3/api-docs/notification
    openapi:
        servers:
            - url: http://localhost:8080
              description: API Gateway
    info:
        title: Notification Worker API
        version: 1.0.0
        description: API for managing notification workers.
