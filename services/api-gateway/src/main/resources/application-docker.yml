spring:
  cloud:
    gateway:
      routes:
        - id: payment-route
          uri: http://payment-service:8081
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: account-route
          uri: http://account-service:8082
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=1
        - id: transaction-route
          uri: http://account-service:8082
          predicates:
            - Path=/api/transactions/**
          filters:
            - StripPrefix=1
