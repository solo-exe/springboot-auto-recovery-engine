name: auto-recovery-engine

services:
  # ============================
  # INFRASTRUCTURE TIER
  # ============================
  postgres:
    image: postgres:17
    container_name: are-postgres
    environment:
      POSTGRES_DB: are_db
      POSTGRES_USER: are_user
      POSTGRES_PASSWORD: are_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U are_user -d are_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: are-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================
  # FINANCIAL MICROSERVICES TIER
  # ============================
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: are-payment-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: are-account-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  notification-worker:
    build:
      context: .
      dockerfile: services/notification-worker/Dockerfile
    container_name: are-notification-worker
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: are-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - payment-service
      - account-service
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:

networks:
  are-network:
    driver: bridge
