name: auto-recovery-engine

services:
  # ============================
  # INFRASTRUCTURE TIER
  # ============================
  postgres:
    image: postgres:17
    container_name: are-postgres
    environment:
      POSTGRES_DB: are_db
      POSTGRES_USER: are_user
      POSTGRES_PASSWORD: are_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U are_user -d are_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: are-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================
  # OBSERVABILITY TIER
  # ============================
  prometheus:
    image: prom/prometheus:latest
    container_name: are-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  loki:
    image: grafana/loki:3.4.3
    container_name: are-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.4.3
    container_name: are-promtail
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana:11.6.0
    container_name: are-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  alertmanager:
    image: prom/alertmanager:latest
    container_name: are-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - are-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ============================
  # MICROSERVICES TIER
  # ============================
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: are-payment-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: auto-recovery-engine-secret-key-for-jwt-token-signing-256bit
      SPRING_BOOT_ADMIN_CLIENT_URL: http://are-spring-boot-admin:8086
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: are-account-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: auto-recovery-engine-secret-key-for-jwt-token-signing-256bit
      SPRING_BOOT_ADMIN_CLIENT_URL: http://are-spring-boot-admin:8086
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  notification-worker:
    build:
      context: .
      dockerfile: services/notification-worker/Dockerfile
    container_name: are-notification-worker
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_BOOT_ADMIN_CLIENT_URL: http://are-spring-boot-admin:8086
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: are-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: auto-recovery-engine-secret-key-for-jwt-token-signing-256bit
      SPRING_BOOT_ADMIN_CLIENT_URL: http://are-spring-boot-admin:8086
    depends_on:
      - payment-service
      - account-service
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  spring-boot-admin:
    build:
      context: .
      dockerfile: services/spring-boot-admin/Dockerfile
    container_name: are-spring-boot-admin
    ports:
      - "8086:8086"
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  recovery-engine:
    build:
      context: .
      dockerfile: services/recovery-engine/Dockerfile
    container_name: are-recovery-engine
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_BOOT_ADMIN_CLIENT_URL: http://are-spring-boot-admin:8086
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - are-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  are-network:
    driver: bridge
