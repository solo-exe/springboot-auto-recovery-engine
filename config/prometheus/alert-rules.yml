# =============================================================================
# Prometheus Alert Rules — ARE Observability
# =============================================================================
# Defines alerting rules aligned with the research project's fault scenarios:
# service unresponsiveness, high error rates, memory pressure, CPU spikes,
# and circuit breaker state changes.
# =============================================================================

groups:
  - name: are_service_health
    interval: 5s
    rules:
      # -----------------------------------------------------------------------
      # Service Down — detects when a scrape target is unreachable
      # -----------------------------------------------------------------------
      - alert: ServiceDown
        expr: up == 0
        for: 5s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "The Prometheus scrape target for {{ $labels.job }} ({{ $labels.instance }}) has been unreachable for over 5 seconds."

      # -----------------------------------------------------------------------
      # High HTTP Error Rate — 5xx responses exceed 10% of total traffic
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[15s])) by (job, application)
            /
            sum(rate(http_server_requests_seconds_count[15s])) by (job, application)
          ) > 0.10
        for: 5s
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.application }}"
          description: "{{ $labels.application }} is returning >10% HTTP 5xx errors over the last 2 minutes. Current rate: {{ $value | humanizePercentage }}."

      # -----------------------------------------------------------------------
      # High Latency — p95 response time exceeds 2 seconds
      # -----------------------------------------------------------------------
      - alert: HighLatency
        expr: |
          (
            sum(rate(http_server_requests_seconds_sum[15s])) by (job, application)
            /
            sum(rate(http_server_requests_seconds_count[15s])) by (job, application)
          ) > 2.0
        for: 5s
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.application }}"
          description: "{{ $labels.application }} p95 response time is above 2s. Current value: {{ $value | humanizeDuration }}."

  - name: are_jvm_health
    interval: 15s
    rules:
      # -----------------------------------------------------------------------
      # High JVM Heap Usage — heap utilization exceeds 85%
      # -----------------------------------------------------------------------
      - alert: HighMemoryUsage
        expr: |
          (
            jvm_memory_used_bytes{area="heap"}
            /
            jvm_memory_max_bytes{area="heap"}
          ) > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage on {{ $labels.application }}"
          description: "{{ $labels.application }} heap usage is above 85%. Current: {{ $value | humanizePercentage }}."

      # -----------------------------------------------------------------------
      # High CPU Usage — process CPU exceeds 80%
      # -----------------------------------------------------------------------
      - alert: HighCpuUsage
        expr: |
          process_cpu_usage > 0.80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.application }}"
          description: "{{ $labels.application }} process CPU usage exceeds 80%. Current: {{ $value | humanizePercentage }}."

  - name: are_resilience
    interval: 10s
    rules:
      # -----------------------------------------------------------------------
      # Circuit Breaker Open — Resilience4j CB is in OPEN state
      # -----------------------------------------------------------------------
      - alert: CircuitBreakerOpen
        expr: |
          resilience4j_circuitbreaker_state{state="open"} == 1
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN on {{ $labels.application }}"
          description: "The Resilience4j circuit breaker '{{ $labels.name }}' on {{ $labels.application }} has tripped to OPEN state, blocking downstream calls."
