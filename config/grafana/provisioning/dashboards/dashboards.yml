# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Tells Grafana to auto-load dashboard JSON files from the specified path.
# =============================================================================

apiVersion: 1

providers:
  - name: 'ARE Dashboards'
    orgId: 1
    folder: 'Auto Recovery Engine'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
